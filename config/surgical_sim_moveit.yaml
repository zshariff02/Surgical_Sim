# surgical_sim_moveit.yaml
# ========================
# MoveIt2 configuration overrides for the surgical positioning simulator.
# These values are merged with the UR5e default moveit_config at launch time.

move_group:
  planning_plugin: ompl_interface/OMPLPlanner
  request_adapters:
    - default_planner_request_adapters/AddTimeOptimalParameterization
    - default_planner_request_adapters/ResolveConstraintFrames
    - default_planner_request_adapters/FixWorkspaceBounds
    - default_planner_request_adapters/FixStartStateBounds
    - default_planner_request_adapters/FixStartStateCollision
    - default_planner_request_adapters/FixStartStatePathConstraints

  # Surgical-specific limits
  max_velocity_scaling_factor: 0.20       # 20 % of UR5e rated max
  max_acceleration_scaling_factor: 0.20

planning_scene_monitor:
  publish_planning_scene: true
  publish_geometry_updates: true
  publish_state_updates: true
  publish_transforms_updates: true
  publish_robot_description: true
  publish_robot_description_semantic: true

ompl:
  planning_plugin: ompl_interface/OMPLPlanner
  manipulator:
    default_planner_config: RRTConnect
    planner_configs:
      - RRTConnect
      - RRT
      - EST
      - KPIECE

    # Workspace limits enforced at planning level (metres, base_link frame)
    workspace:
      min_x: -0.30
      max_x:  0.30
      min_y:  0.10
      max_y:  0.60
      min_z:  0.00
      max_z:  0.40

    projection_evaluator: joints(shoulder_pan_joint,shoulder_lift_joint)
    longest_valid_segment_fraction: 0.005

# Collision checking
collision_detection:
  collision_detector: FCL
  collision_detector_plugin_name: collision_detection/CollisionPluginFCL

# Trajectory execution
trajectory_execution:
  allowed_execution_duration_scaling: 1.2
  allowed_goal_duration_margin: 0.5
  allowed_start_tolerance: 0.01
  execution_duration_monitoring: true

# Controller interface
controller_manager:
  ros__parameters:
    update_rate: 100   # Hz

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_trajectory_controller:
  ros__parameters:
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
